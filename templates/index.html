<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMind 销售数据管理系统</title>
    <!-- 引入外部资源 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/css.css') }}">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa fa-bar-chart"></i> DataMind 销售数据管理
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#"><i class="fa fa-home"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fa fa-question-circle"></i> 帮助</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-5">
        <!-- 上传区域 -->
        <div class="card mb-5 animate-fade-in">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0"><i class="fa fa-upload"></i> 上传销售数据文件</h5>
            </div>
            <div class="card-body">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="input-group mb-3">
                        <input type="file" class="form-control" id="fileInput" accept=".csv,.xlsx,.xls" required>
                        <button class="btn btn-primary" type="submit">
                            <i class="fa fa-upload"></i> 上传并解析
                        </button>
                    </div>
                    <div class="form-text text-muted">
                        支持CSV/Excel格式，字段需包含：日期、产品ID、销售额、区域
                    </div>
                </form>
                <!-- 上传状态提示 -->
                <div id="uploadStatus" class="mt-3 d-none"></div>
            </div>
        </div>

        <!-- 数据表格区域 -->
        <div class="card animate-slide-up d-none" id="dataTableCard">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fa fa-table"></i> 销售数据表格</h5>
                <button id="saveDataBtn" class="btn btn-light btn-sm">
                    <i class="fa fa-save"></i> 保存修改
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table id="salesTable" class="table table-striped table-hover">
                        <thead class="table-dark"></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2025 DataMind 企业销售分析系统 | 基于Python Flask开发</p>
        </div>
    </footer>

    <!-- 引入JS库 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/js.js') }}"></script>
</body>
</html>
